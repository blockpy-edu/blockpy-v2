name: Deploy to GitHub Pages

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

# Allow only one concurrent deployment; cancel in-progress runs but do not
# cancel queued runs so that only the latest deployment makes it out.
concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Lint
              run: npm run lint

            - name: Type check
              run: npm run typecheck

            - name: Test
              run: npm test

            - name: Configure Pages
              uses: actions/configure-pages@v5
              id: pages

            - name: Build
              run: npm run build
              env:
                  # Vite uses VITE_BASE_URL or --base flag; pass the Pages base path so
                  # assets resolve correctly when deployed to a sub-path.
                  VITE_BASE_URL: ${{ steps.pages.outputs.base_path }}

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: dist

    deploy:
        name: Deploy
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deploy.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deploy
              uses: actions/deploy-pages@v4
